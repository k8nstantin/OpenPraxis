name: CI

on:
  push:
    branches:
      - main
      - sandbox
      - dev
  pull_request:
    branches:
      - main
      - sandbox
      - dev

permissions:
  contents: read

jobs:
  build-test:
    name: build + vet + test (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Node toolchain for Portal V2 (the only React frontend after the
      # legacy /dashboard route was retired). Embedded via go:embed
      # (handler_v2.go: ui/dashboard-v2/dist) — must build before
      # `go build` or CI ships stale assets.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            internal/web/ui/dashboard-v2/package-lock.json

      - name: npm ci (dashboard-v2)
        working-directory: internal/web/ui/dashboard-v2
        run: npm ci

      - name: tsc --noEmit (dashboard-v2, strict TS gate)
        working-directory: internal/web/ui/dashboard-v2
        run: npm run check

      - name: npm run build (dashboard-v2)
        working-directory: internal/web/ui/dashboard-v2
        run: npm run build

      - name: go build
        env:
          CGO_ENABLED: '1'
        run: go build -trimpath ./...

      - name: go vet
        env:
          CGO_ENABLED: '1'
        run: go vet ./...

      - name: go test
        env:
          CGO_ENABLED: '1'
        run: go test ./...
