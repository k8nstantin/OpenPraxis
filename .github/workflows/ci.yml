name: CI

on:
  push:
    branches:
      - main
      - sandbox
      - dev
  pull_request:
    branches:
      - main
      - sandbox
      - dev

permissions:
  contents: read

jobs:
  build-test:
    name: build + vet + test (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        env:
          CGO_ENABLED: '1'
        run: go build -trimpath ./...

      - name: go vet
        env:
          CGO_ENABLED: '1'
        run: go vet ./...

      - name: go test
        env:
          CGO_ENABLED: '1'
        run: go test ./...
