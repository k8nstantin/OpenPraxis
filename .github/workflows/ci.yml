name: CI

on:
  push:
    branches:
      - main
      - sandbox
      - dev
  pull_request:
    branches:
      - main
      - sandbox
      - dev

permissions:
  contents: read

jobs:
  build-test:
    name: build + vet + test (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Node toolchain for the Svelte v2 dashboard. The Go binary embeds
      # internal/web/ui/dashboard/dist via go:embed, so the frontend MUST
      # build before `go build` — otherwise CI ships the chunk-1 stub
      # index.html instead of real Svelte assets.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: internal/web/ui/dashboard/package-lock.json

      - name: npm ci (dashboard)
        working-directory: internal/web/ui/dashboard
        run: npm ci

      - name: npm test (dashboard vitest)
        working-directory: internal/web/ui/dashboard
        run: npm test

      - name: npm run build (dashboard)
        working-directory: internal/web/ui/dashboard
        run: npm run build

      - name: go build
        env:
          CGO_ENABLED: '1'
        run: go build -trimpath ./...

      - name: go vet
        env:
          CGO_ENABLED: '1'
        run: go vet ./...

      - name: go test
        env:
          CGO_ENABLED: '1'
        run: go test ./...
